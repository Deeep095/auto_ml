services:

  ml-engine:
    build:
      context: ./ml_engine
    container_name: ml_engine
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/shared

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./shared:/shared
    depends_on:
      - ml-engine
    environment:
    - N8N_RESTRICT_FILE_ACCESS_TO=/shared